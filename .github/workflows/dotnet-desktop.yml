name: CI Build (WPF)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore .\Monitor\Monitor.csproj

      - name: Build
        run: dotnet build .\Monitor\Monitor.csproj -c Release --no-restore
