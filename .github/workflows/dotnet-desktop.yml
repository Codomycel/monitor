name: WPF .NET 8 Build (master)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore .\Operon\Operon.csproj

      - name: Build
        run: dotnet build .\Operon\Operon.csproj -c Release --no-restore
